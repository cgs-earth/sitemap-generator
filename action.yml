name: "Sitemap Generator"

description: "Generate Sitemap in GitHub Actions"

branding:
  icon: server
  color: purple

inputs:
  namespace_dir:
    description: "Filepath to load data from"
    required: true
    default: "./namespaces"
  sitemap_dir:
    description: "Directory for sitemap output"
    required: true
    default: "./sitemap"
  base_uri:
    description: "Base URI for sitemap"
    required: true
    default: "https://geoconnex.us"
outputs:
  sitemap:
    description: "Sitemap folder"
runs:
  using: "composite"
  steps:
    - shell: bash
      env:
        SITEMAP_DIR: ${{ inputs.sitemap_dir }}
      run: |
        pip3 install git+https://github.com/cgs-earth/sitemap-generator.git
        sitemap-generator run ${{ inputs.namespace_dir }} --uri-base ${{ inputs.base_uri }}

    - name: Zip sitemap
      uses: vimtor/action-zip@v1
      with:
        files: ${{ inputs.sitemap_dir }}
        dest: sitemap.zip

    - name: Archive Sitemap
      uses: actions/upload-artifact@v4
      with:
        name: sitemap
        path: sitemap.zip
